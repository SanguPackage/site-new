server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The only dynamic endpoint the userscript polls; the version never changes
    # again, so serve it statically instead of running PHP.
    location = /api/sangupackageversion.php {
        default_type text/html;
        add_header Access-Control-Allow-Origin *;
        return 200 '8.233.3';
    }

    # The one pretty-url whose target filename differs from the path.
    location = /twsimulator {
        try_files /bernos-twsimulator.html =404;
    }

    # /support -> support.html, /about -> about.html, ... (replaces .htaccess rewrites).
    # TLS/HTTPS redirect intentionally dropped: the proxy terminates TLS.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
