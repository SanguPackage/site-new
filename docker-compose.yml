# tribalwars.sangu.be — static site (no DB, no PHP).
# Coolify: deploy this repo as an application, set the domain to tribalwars.sangu.be
# in the UI (it injects Traefik routing + TLS). The host port below is for local testing only.
services:
  tribalwars:
    build: .
    container_name: tribalwars
    restart: unless-stopped
    ports:
      - "8081:80"
